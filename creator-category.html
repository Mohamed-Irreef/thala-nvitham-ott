<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="assets/logo-icon.png"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Browse Creators — Thala Nivitham</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" crossorigin="anonymous"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/creators.css"/>
  <link rel="stylesheet" href="css/creator-category.css"/>

<body>

  <!-- ══════════ NAVBAR ══════════ -->
  <div id="navbar-placeholder"></div>

    <div class="cc-header">
      <div class="cc-breadcrumb">

        <span class="cc-breadcrumb-sep">/</span>

    <div class="cc-tabs-wrapper">
      <div class="cc-tabs" id="cc-tabs">

      </div>
    </div>

    <!-- Creator Grid + Load More -->
    <div class="cc-content">
      <div class="creator-grid" id="cc-grid">

      </div>
      <div class="cc-load-more-wrapper">
        <button class="cc-load-more-btn" id="cc-load-more-btn">
