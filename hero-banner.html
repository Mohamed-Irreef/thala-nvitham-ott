<!--
  ╔══════════════════════════════════════════════════════════╗
  ║         THALA NIVITHAM — HERO BANNER COMPONENT          ║
  ║                 Canonical Reference Template             ║
  ╚══════════════════════════════════════════════════════════╝

  This file is the single source of truth for the hero banner
  layout used on every page of the platform.

  RULES:
  ─────────────────────────────────────────────────────────
  ✅ ALLOWED to change per page:
     - background-image URL           (.hero-background style)
     - hero-badge text & color        (span.hero-badge)
     - hero-title                     (h1.hero-title)
     - hero-meta items                (div.hero-meta spans)
     - hero-description text          (p.hero-description)
     - button labels & data-* attrs   (.hero-play, .hero-icon)

  ❌ NOT allowed to change:
     - Banner height     → always 520px   (.hero-banner)
     - Layout / flexbox  → defined in CSS
     - Gradient overlay  → defined in CSS (.hero-background::before)
     - Bottom fade       → defined in CSS (.hero-background::after)
     - Text alignment    → always left
     - Max-width         → 500px on .hero-text, 1400px container
     - Padding           → 60px left (var(--nav-height) top)

  DEPENDENCIES:
  ─────────────────────────────────────────────────────────
  - css/style.css  (provides .hero-banner, .hero-background,
                    .hero-content, .hero-text, .hero-badge,
                    .hero-title, .hero-meta, .hero-description,
                    .hero-actions, .hero-play, .hero-icon)
-->

<!-- ══════════════════════════════════════════════════════
     HERO BANNER  — copy this block into each page
     Replace: background-image, badge, title, meta, desc, btns
     ═══════════════════════════════════════════════════════ -->
<section class="hero-banner">

  <!-- Background image layer (fills banner, aligned right) -->
  <div class="hero-background"
       style="background-image: url('assets/REPLACE-WITH-PAGE-IMAGE.jpg')">
  </div>

  <!-- Text content — left side -->
  <div class="hero-content">
    <div class="hero-text">

      <!-- Optional category/status badge -->
      <span class="hero-badge">🔥 BADGE TEXT</span>

      <!-- Main title -->
      <h1 class="hero-title">Page Title Here</h1>

      <!-- Meta info row (duration, genre, year, etc.) -->
      <div class="hero-meta">
        <span>Meta 1</span> • <span>Meta 2</span> • <span>Meta 3</span>
      </div>

      <!-- Short description -->
      <p class="hero-description">
        Short description of the featured content on this page.
        Keep it to 1–2 sentences for the best visual balance.
      </p>

      <!-- Action buttons -->
      <div class="hero-actions">
        <!-- Primary CTA -->
        <button class="hero-play">▶ Primary Action</button>
        <!-- Secondary icon buttons -->
        <button class="hero-icon" title="Save">+</button>
        <button class="hero-icon" title="Share"><i class="fa-solid fa-share-nodes"></i></button>
      </div>

    </div>
  </div>

</section>
<!-- ══════════════════════════════════════════════════════ -->
